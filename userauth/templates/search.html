{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 position-relative" id="searchContainer">
            <form method="POST" id="searchForm" autocomplete="off">
                {% csrf_token %}
                <div class="input-group mb-3">
                    <input type="text" name="username" id="searchInput" class="form-control rounded-pill"
                           placeholder="Search for username..." style="margin-right: 5px;">
                    <button type="submit" class="btn btn-outline-primary rounded-pill">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </form>

            {% if users %}
            <div class="mb-2 text-end">
                <form method="POST" action="{% url 'clear_search_history' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">Clear All History</button>
                </form>
            </div>
            {% endif %}

            <div id="searchResults">
                {% if users %}
                    {% for user in users %}
                    <div style="display:flex; align-items:center; justify-content:space-between; padding:10px; margin-bottom:5px; border-radius:10px;">
                        <a href="/profile/{{ user.username }}" style="display:flex; align-items:center; text-decoration:none; color:#fff;">
                            <img src="{{ user.profile.profileimg.url }}" width="36" height="36" class="rounded-circle me-2" style="border:2px solid #fff;">
                            <span>{{ user.username }}</span>
                        </a>
                        <form method="POST" action="{% url 'remove_from_search_history' user.id %}">
                            {% csrf_token %}
                            <button type="submit" style="background:none; border:none; color:#999; font-size:18px; cursor:pointer;">&times;</button>
                        </form>
                    </div>
                    {% endfor %}
                {% else %}
                    <div style="padding:10px; color:#999; text-align:center;">No search history yet</div>
                {% endif %}
            </div>

        </div>
    </div>
</div>

<script>
const searchContainer = document.getElementById('searchContainer');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const csrfToken = '{{ csrf_token }}';

searchInput.addEventListener('focus', async () => {
    const response = await fetch('/get-history/');
    const history = await response.json();

    searchResults.innerHTML = '';
    if (history.length === 0) {
        searchResults.innerHTML = `<div style="padding:10px; color:#999; text-align:center;">No search history yet</div>`;
    } else {
        history.forEach(user => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex; align-items:center; justify-content:space-between; padding:10px 12px; margin-bottom:5px; border-radius:10px;';
            div.innerHTML = `
                <a href="/save-search/${user.id}/" style="display:flex; align-items:center; text-decoration:none; color:#fff;">
                    <img src="${user.profileimg}" width="36" height="36" class="rounded-circle me-2" style="border:2px solid #fff;">
                    <span>${user.username}</span>
                </a>
            `;
            searchResults.appendChild(div);
        });
    }
    searchResults.style.display = 'block';
});

searchInput.addEventListener('input', async () => {
    const query = searchInput.value.trim();
    if (!query) {
        searchInput.focus();
        return;
    }

    const response = await fetch(`/live-search/?q=${query}`);
    const results = await response.json();

    searchResults.innerHTML = '';
    if (results.length === 0) {
        searchResults.innerHTML = `<div style="padding:10px; color:#999; text-align:center;">No results found</div>`;
    } else {
        results.forEach(user => {
            const div = document.createElement('div');
            div.style.cssText = 'display:flex; align-items:center; justify-content:space-between; padding:10px 12px; margin-bottom:5px; border-radius:10px;';
            div.innerHTML = `
                <a href="/save-search/${user.id}/" style="display:flex; align-items:center; text-decoration:none; color:#fff;">
                    <img src="${user.profileimg}" width="36" height="36" class="rounded-circle me-2" style="border:2px solid #fff;">
                    <span>${user.username}</span>
                </a>
            `;
            searchResults.appendChild(div);
        });
    }
    searchResults.style.display = 'block';
});
</script>
{% endblock %}
